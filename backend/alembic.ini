# Alembic Configuration File
# Path to migration scripts
script_location = alembic

# SQLAlchemy database URL - loads from environment or defaults to SQLite
sqlalchemy.url = sqlite:///./avre.db

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

# Migration file naming template
file_template = %%(rev)s_%%(slug)s

# Logging level when executing SQL
sqlalchemy_echo = false

# Use the target_metadata from env.py
target_metadata = target_metadata

# Multiple bases per file
version_hash_length = 7
version_location_validation = all

# Default is True
version_path_separator = :
